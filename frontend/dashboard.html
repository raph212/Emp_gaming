<!doctype html>
<html>
<head>
  <meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="bg-gray-900 text-white min-h-screen">
  <div class="max-w-5xl mx-auto p-6">
    <div class="flex justify-between items-center mb-6">
      <h1 class="text-3xl font-bold">Gaming Hub</h1>
      <div>
        <button id="logout" class="px-4 py-2 bg-red-600 rounded">Logout</button>
      </div>
    </div>

    <div class="grid md:grid-cols-3 gap-6 mb-6">
      <div class="p-6 bg-gray-800 rounded">
        <h2 class="font-bold">Snake</h2>
        <p class="text-sm text-gray-400">Best: <span id="best-snake">0</span></p>
        <button id="play-snake" class="mt-3 px-4 py-2 bg-indigo-600 rounded">Play</button>
      </div>
      <div class="p-6 bg-gray-800 rounded">
        <h2 class="font-bold">Memory</h2>
        <p class="text-sm text-gray-400">Best: <span id="best-memory">0</span></p>
        <button id="play-memory" class="mt-3 px-4 py-2 bg-indigo-600 rounded">Play</button>
      </div>
      <div class="p-6 bg-gray-800 rounded">
        <h2 class="font-bold">2048</h2>
        <p class="text-sm text-gray-400">Best: <span id="best-2048">0</span></p>
        <button id="play-2048" class="mt-3 px-4 py-2 bg-indigo-600 rounded">Play</button>
      </div>
    </div>

    <div class="grid md:grid-cols-2 gap-6">
      <div class="p-6 bg-gray-800 rounded">
        <h3 class="font-bold mb-2">Leaderboard</h3>
        <div id="leaderboard"></div>
        <!-- ===== Admin Coupon Panel ===== -->
<section id="adminPanel" class="mt-10 bg-gray-800 p-6 rounded-xl hidden">
  <h2 class="text-2xl font-bold mb-4">🎟️ Coupon Management (Admin)</h2>
  <div class="flex gap-3 mb-4">
    <input id="couponUserId" placeholder="Enter User ID" class="w-1/2 p-2 rounded bg-gray-700 text-white"/>
    <button id="generateCouponBtn" class="p-2 bg-green-600 rounded hover:bg-green-700">Generate Coupon</button>
  </div>

  <button id="loadCouponsBtn" class="p-2 bg-indigo-600 rounded hover:bg-indigo-700 mb-4">Load All Coupons</button>
  <button id="cleanupScoresBtn" class="p-2 bg-red-600 rounded hover:bg-red-700 mb-4 ml-2">
  🧹 Cleanup Scores
</button>

  <table class="w-full text-left border-collapse">
    <thead class="bg-gray-700">
      <tr>
        <th class="p-2">User</th>
        <th class="p-2">Code</th>
        <th class="p-2">Redeemed</th>
        <th class="p-2">Email</th>
        <th class="p-2">Actions</th>
      </tr>
    </thead>
    <tbody id="couponTableBody" class="bg-gray-800"></tbody>
  </table>
</section>

<script type="module" src="./js/redeem.js"></script>

        
      </div>

      <div class="p-6 bg-gray-800 rounded">
        <h3 class="font-bold mb-2">Redeem Coupon</h3>
        <input id="redeem-email" placeholder="Email" class="w-full p-2 mb-2 bg-gray-700 rounded"/>
        <input id="redeem-code" placeholder="Coupon code" class="w-full p-2 mb-2 bg-gray-700 rounded"/>
        <button id="redeem-btn" class="px-4 py-2 bg-green-600 rounded">Redeem</button>
        <div id="redeem-msg" class="mt-2 text-sm"></div>
      </div>
      <div class="p-6 bg-gray-800 rounded mt-6">
  <h3 class="font-bold mb-3 text-xl">🎟️ My Coupons</h3>
  <button id="loadMyCoupons" class="px-4 py-2 mb-3 bg-indigo-600 rounded">Load My Coupons</button>
  <table class="w-full text-left border-collapse">
    <thead class="bg-gray-700">
      <tr>
        <th class="p-2">Code</th>
        <th class="p-2">Status</th>
        <th class="p-2">Issued On</th>
      </tr>
    </thead>
    <tbody id="myCouponTable" class="bg-gray-800"></tbody>
  </table>
</div>

    </div>
  </div>

  <script type="module">
    import { apiRequest } from './js/api.js';
    import { loadLeaderboard } from './js/leaderboard.js';

    const user = JSON.parse(localStorage.getItem('activeUser') || 'null');
    if(!user) location.href = 'index.html';

    document.getElementById('logout').addEventListener('click', ()=>{ localStorage.removeItem('activeUser'); location.href='index.html'; });

    async function loadDashboard(){
      // show best from user object
      document.getElementById('best-snake').innerText = user.scores?.snake || 0;
      document.getElementById('best-memory').innerText = user.scores?.memoryCards || 0;
      document.getElementById('best-2048').innerText = user.scores?.['2048'] || 0;

      // leaderboard
      await loadLeaderboard('leaderboard');
    }
    loadDashboard();

    document.getElementById('redeem-btn').addEventListener('click', async ()=>{
      const email = document.getElementById('redeem-email').value.trim();
      const code = document.getElementById('redeem-code').value.trim();
      if(!email||!code) return document.getElementById('redeem-msg').innerText = 'Enter both.';
      const res = await apiRequest('/coupons/redeem','POST',{ code, email });
      document.getElementById('redeem-msg').innerText = res.message || JSON.stringify(res);
    });

    // ===== Load My Coupons =====
document.getElementById("loadMyCoupons").addEventListener("click", async () => {
  try {
    const userId = user._id;
    const myCoupons = await apiRequest(`/coupons/user/${userId}`, "GET");
    const table = document.getElementById("myCouponTable");

    if (!Array.isArray(myCoupons)) {
      table.innerHTML = `<tr><td colspan="3" class="p-2 text-gray-400">${myCoupons.message || "No coupons found"}</td></tr>`;
      return;
    }

    table.innerHTML = myCoupons
      .map(
        (c) => `
        <tr>
          <td class="p-2">${c.code}</td>
          <td class="p-2">${c.redeemed ? "✅ Redeemed" : "❌ Not Redeemed"}</td>
          <td class="p-2">${new Date(c.issuedAt).toLocaleString()}</td>
        </tr>`
      )
      .join("");
  } catch (err) {
    console.error("Failed to load user coupons:", err);
  }
});


    // Play buttons (open game pages)
    document.getElementById('play-snake').addEventListener('click', ()=> location.href='games/snake.html');
    document.getElementById('play-memory').addEventListener('click', ()=> location.href='games/memory.html');
    document.getElementById('play-2048').addEventListener('click', ()=> location.href='games/2048.html');
  </script>
  <script>
const activeUser = JSON.parse(localStorage.getItem("activeUser") || "null");
if (activeUser && activeUser.isAdmin) {
  document.getElementById("adminPanel").classList.remove("hidden");
} else {
  console.log("Not an admin, hiding coupon panel.");
}
</script>
<script type="module">
import { apiRequest } from "./js/api.js";

// ====== GENERATE COUPON (ADMIN ONLY) ======
const generateBtn = document.getElementById("generateCouponBtn");
const loadBtn = document.getElementById("loadCouponsBtn");
const couponTableBody = document.getElementById("couponTableBody");

if (generateBtn) {
  generateBtn.addEventListener("click", async () => {
    const userId = document.getElementById("couponUserId").value.trim();
    if (!userId) {
      alert("⚠️ Please enter a valid User ID!");
      return;
    }

    try {
      const res = await apiRequest("/coupons/generate", "POST", { userId });
      alert(`✅ Coupon Generated: ${res.code}`);
      await loadCoupons(); // reload the table
    } catch (err) {
      alert("❌ Failed to generate coupon. Check console for details.");
      console.error(err);
    }
  });
}

// ====== LOAD ALL COUPONS ======
async function loadCoupons() {
  try {
    const coupons = await apiRequest("/coupons", "GET");
    couponTableBody.innerHTML = coupons
      .map(
        (c) => `
      <tr>
        <td class="p-2">${c.userId?.displayName || "—"}</td>
        <td class="p-2">${c.code}</td>
        <td class="p-2">${c.redeemed ? "✅" : "❌"}</td>
        <td class="p-2">${c.email || "—"}</td>
        <td class="p-2">${new Date(c.issuedAt).toLocaleString()}</td>
      </tr>
    `
      )
      .join("");
  } catch (err) {
    console.error("Failed to load coupons", err);
  }
}

if (loadBtn) {
  loadBtn.addEventListener("click", loadCoupons);
}
// ====== CLEANUP SCORES (ADMIN ONLY) ======
const cleanupBtn = document.getElementById("cleanupScoresBtn");

if (cleanupBtn) {
  cleanupBtn.addEventListener("click", async () => {
    if (!confirm("⚠️ Are you sure you want to clean up all scores? This will delete old low scores!")) return;
    try {
      const res = await apiRequest("/scores/cleanup", "DELETE");
      alert(res.message || "✅ Cleanup completed!");
    } catch (err) {
      console.error("❌ Cleanup failed:", err);
      alert("❌ Cleanup failed. Check console for details.");
    }
  });
}

</script>

</body>
</html>
